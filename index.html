<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задай вопрос Istamoov_i</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: #f4f4f4;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 4px;
    border: 1px solid #e0e0e0;
    padding: 2.5rem 2rem 2rem;
    width: 100%;
    max-width: 440px;
  }

  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
  }

  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid #111;
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .profile-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .username {
    font-size: 17px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .tg-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #666;
    letter-spacing: 0.3px;
  }

  .tg-badge svg { opacity: 0.6; }

  .divider {
    border: none;
    border-top: 1px solid #e8e8e8;
    margin: 0 0 1.75rem;
  }

  .tagline {
    font-size: 21px;
    font-weight: 700;
    color: #111;
    text-align: center;
    margin-bottom: 1.75rem;
    line-height: 1.35;
    letter-spacing: -0.3px;
  }

  .label {
    font-size: 11px;
    color: #888;
    margin-bottom: 7px;
    display: block;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .input-wrap { margin-bottom: 1.1rem; }

  .tg-wrap { position: relative; }

  .tg-prefix {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 14px;
    pointer-events: none;
    font-weight: 500;
  }

  .tg-wrap input { padding-left: 26px !important; }

  input[type="text"], textarea {
    width: 100%;
    border: 1px solid #d0d0d0;
    border-radius: 2px;
    padding: 12px 13px;
    font-size: 15px;
    font-family: inherit;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: #111;
  }

  input[type="text"]::placeholder, textarea::placeholder {
    color: #bbb;
  }

  textarea {
    min-height: 130px;
    resize: none;
    line-height: 1.6;
  }

  .anon-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 1.2rem;
  }

  .btn-send {
    width: 100%;
    padding: 14px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .btn-send:hover { background: #333; }
  .btn-send:active { transform: scale(0.99); }
  .btn-send:disabled { background: #999; cursor: not-allowed; }

  .error-msg {
    display: none;
    background: #fff5f5;
    border: 1px solid #e0b0b0;
    border-radius: 2px;
    padding: 10px 13px;
    font-size: 13px;
    color: #c00;
    margin-bottom: 1rem;
  }

  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 1.5rem 0;
    text-align: center;
  }

  .success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .success-title {
    font-size: 17px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .success-sub {
    font-size: 13px;
    color: #888;
  }

  .footer {
    text-align: center;
    margin-top: 1.75rem;
    font-size: 11px;
    color: #ccc;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .loading {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    <div class="anon-badge">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.2">
        <rect x="3" y="11" width="18" height="11" rx="1"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Анонимно — никто не узнает кто ты, если не укажешь ник
    </div>

    <button class="btn-send" id="send-btn" onclick="handleSend()">
      Отправить
    </button>
  </div>

  <div class="success" id="success-area">
    <div class="success-icon">✓</div>
    <p class="success-title">Отправлено</p>
    <p class="success-sub">Istamoov_i увидит твой вопрос в Telegram</p>
    <button class="btn-send" onclick="resetForm()" style="margin-top:8px; max-width:180px;">
      Ещё вопрос
    </button>
  </div>

  <div class="footer">Anonymous Q&amp;A · istamoov_i</div>
</div>

<script>
  const SEND_MESSAGE_ENDPOINT = '/api/send-message';

  async function handleSend() {
    const msg = document.getElementById('msg').value.trim();
    const tg = document.getElementById('tg').value.trim();
    const btn = document.getElementById('send-btn');
    const errDiv = document.getElementById('error-msg');

    if (!msg) {
      document.getElementById('msg').style.borderColor = '#c00';
      document.getElementById('msg').focus();
      return;
    }

    document.getElementById('msg').style.borderColor = '';
    errDiv.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Отправка...';

    try {
      const res = await fetch(SEND_MESSAGE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg, tg })
      });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').style.display = 'flex';
      } else throw new Error(data.description);
    } catch {
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Отправить';
    }
  }

  function resetForm() {
    document.getElementById('msg').value = '';
    document.getElementById('tg').value = '';
    document.getElementById('msg').style.borderColor = '';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('form-area').style.display = 'block';
    document.getElementById('success-area').style.display = 'none';
    document.getElementById('send-btn').disabled = false;
    document.getElementById('send-btn').innerHTML = 'Отправить';
  }

  document.getElementById('msg').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') handleSend();
  });
</script>

</body>
</html>
